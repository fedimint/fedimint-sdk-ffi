name: Nix Native Builds

on:
  push:
    paths:
      - "fedimint-client-uniffi/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix-build.yml"
  pull_request:
    paths:
      - "fedimint-client-uniffi/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix-build.yml"

jobs:
  build-ios:
    name: Build iOS Artifacts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            sandbox = relaxed
            
      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: fedimint
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Build iOS aarch64 (Device)
        run: nix build .#ios-aarch64-apple-ios -L --accept-flake-config --option sandbox relaxed
        
      - name: Build iOS aarch64 (Simulator)
        run: nix build .#ios-aarch64-apple-ios-sim -L --accept-flake-config --option sandbox relaxed
        
      - name: Build iOS x86_64 (Simulator)
        run: nix build .#ios-x86_64-apple-ios -L --accept-flake-config --option sandbox relaxed
        
      - name: Build iOS Bundle (xcframework parts)
        run: nix build .#iosBundle -L --accept-flake-config --option sandbox relaxed

  build-android:
    name: Build Android Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          
      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: fedimint
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Build Android aarch64
        run: nix build .#android-aarch64-linux-android -L --accept-flake-config
        
      - name: Build Android x86_64
        run: nix build .#android-x86_64-linux-android -L --accept-flake-config
        
      - name: Build Android Bundle (jniLibs)
        run: nix build .#androidBundle -L --accept-flake-config
